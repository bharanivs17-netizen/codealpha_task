<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Success — LuxeStore</title>
  <meta name="description" content="Thank you for your order at LuxeStore.">
  <link rel="stylesheet" href="/assets/css/global.css">
  <style>
    .success-page { padding: calc(var(--nav-height) + 3rem) 0 4rem; text-align: center; }
    .success-card {
      max-width: 600px; margin: 0 auto; padding: 3rem 2rem;
      background: var(--grad-card); border: 1px solid var(--color-border);
      border-radius: var(--radius-2xl); display: flex; flex-direction: column; align-items: center; gap: 1.5rem;
    }
    .success-icon {
      font-size: 4rem; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center;
      background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--color-green); border-radius: 50%; animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    .order-details-box {
      width: 100%; text-align: left; padding: 1.25rem; background: var(--color-surface);
      border: 1px solid var(--color-border); border-radius: var(--radius-lg); margin-top: 1rem;
    }
    .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; font-size: 0.875rem; }
    .detail-row:not(:last-child) { border-bottom: 1px solid var(--color-border); }

    @keyframes scaleIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  </style>
</head>
<body>

<div class="success-page">
  <div class="container">
    <div class="success-card">
      <div class="success-icon">✓</div>
      
      <h1 class="display-2" style="font-size: 2.25rem;">Order Placed Successfully!</h1>
      
      <p class="text-secondary" style="max-width: 450px; line-height: 1.7;">
        Thank you for shopping at LuxeStore. Your payment has been processed and your order has been received. A confirmation email has been sent to you.
      </p>

      <div class="order-details-box" id="order-details-box">
        <div style="font-weight: 700; margin-bottom: 0.75rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.5rem;">Order Details</div>
        <div id="details-content">
          <!-- Injected by JS -->
          <div class="skeleton" style="height: 14px; width: 100%; border-radius: 4px; margin-bottom: 0.5rem;"></div>
          <div class="skeleton" style="height: 14px; width: 80%; border-radius: 4px;"></div>
        </div>
      </div>

      <div style="display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; justify-content: center;">
        <a href="/pages/dashboard.html#orders" class="btn btn-primary">📦 View My Orders</a>
        <a href="/pages/shop.html" class="btn btn-secondary">🛍️ Continue Shopping</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { renderNavbar } from '/assets/js/navbar.js';
  import { orderAPI } from '/assets/js/api.js';
  import { formatPrice, formatDate } from '/assets/js/utils.js';

  renderNavbar();

  const params = new URLSearchParams(window.location.search);
  const orderId = params.get('orderId');

  if (!orderId) {
    window.location.href = '/index.html';
  }

  async function loadOrderDetails() {
    try {
      const res = await orderAPI.getOne(orderId);
      const order = res.order;

      document.getElementById('details-content').innerHTML = `
        <div class="detail-row">
          <span class="text-muted">Order Number</span>
          <strong class="text-primary-color">${order.orderNumber}</strong>
        </div>
        <div class="detail-row">
          <span class="text-muted">Date</span>
          <span>${formatDate(order.createdAt)}</span>
        </div>
        <div class="detail-row">
          <span class="text-muted">Deliver to</span>
          <span>${order.shippingAddress?.fullName}</span>
        </div>
        <div class="detail-row">
          <span class="text-muted">Payment Status</span>
          <span class="text-green font-bold">Paid via Credit Card</span>
        </div>
        <div class="detail-row" style="border-top: 1px solid var(--color-border); padding-top: 0.75rem; margin-top: 0.25rem;">
          <strong style="color: var(--text-primary);">Total Amount</strong>
          <strong class="gradient-text" style="font-size: 1.125rem;">${formatPrice(order.totalPrice)}</strong>
        </div>`;
    } catch(e) {
      document.getElementById('details-content').innerHTML = `<span class="text-red">Error fetching order details. Please visit your User Dashboard to track orders.</span>`;
    }
  }

  loadOrderDetails();
</script>
</body>
</html>
