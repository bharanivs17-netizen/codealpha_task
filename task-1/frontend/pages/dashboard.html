<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard — LuxeStore</title>
  <meta name="description" content="Manage your LuxeStore profile, view order history, edit addresses, and browse wishlist.">
  <link rel="stylesheet" href="/assets/css/global.css">
  <style>
    .dashboard-page { padding: calc(var(--nav-height) + 2rem) 0 4rem; }
    .dashboard-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2rem; align-items: start; }

    /* Left Sidebar Menu */
    .dashboard-sidebar {
      background: var(--grad-card); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl); padding: 1.5rem 1rem;
      position: sticky; top: calc(var(--nav-height) + 1rem);
    }
    .user-profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.75rem; margin-bottom: 2rem; }
    .user-avatar-big {
      width: 80px; height: 80px; border-radius: 50%; background: var(--grad-primary);
      display: flex; align-items: center; justify-content: center; font-size: 2.25rem; font-weight: 700;
      border: 3px solid var(--color-border);
    }
    .dashboard-menu-btn {
      width: 100%; display: flex; align-items: center; gap: 0.75rem;
      padding: 0.75rem 1rem; border-radius: var(--radius-md); font-weight: 500;
      color: var(--text-secondary); transition: all 0.2s; text-align: left;
    }
    .dashboard-menu-btn:hover, .dashboard-menu-btn.active {
      color: var(--text-primary); background: var(--color-surface-2);
    }
    .dashboard-menu-btn.active { border-left: 3px solid var(--color-primary); border-radius: 0 var(--radius-md) var(--radius-md) 0; }

    /* Dashboard Contents */
    .dashboard-content-panel { display: none; }
    .dashboard-content-panel.active { display: block; }

    /* Address list and Order table */
    .dashboard-card {
      background: var(--grad-card); border: 1px solid var(--color-border);
      border-radius: var(--radius-xl); padding: 2rem; margin-bottom: 1.5rem;
    }
    .db-table { width: 100%; border-collapse: collapse; text-align: left; }
    .db-table th { padding: 1rem; border-bottom: 2px solid var(--color-border); color: var(--text-secondary); font-size: 0.875rem; }
    .db-table td { padding: 1rem; border-bottom: 1px solid var(--color-border); font-size: 0.9375rem; }
    .db-table tr:hover td { background: rgba(255, 255, 255, 0.02); }

    .address-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

    @media (max-width: 900px) {
      .dashboard-layout { grid-template-columns: 1fr; }
      .dashboard-sidebar { position: static; }
    }
  </style>
</head>
<body>

<div class="dashboard-page">
  <div class="container">
    <div class="dashboard-layout">
      <!-- Sidebar navigation -->
      <aside class="dashboard-sidebar">
        <div class="user-profile-header">
          <div class="user-avatar-big" id="dashboard-user-avatar">U</div>
          <div>
            <h3 class="heading-3" id="dashboard-user-name">User Name</h3>
            <span class="badge badge-primary mt-xs" id="dashboard-user-role">Customer</span>
          </div>
        </div>
        
        <nav style="display: flex; flex-direction: column; gap: 0.25rem;">
          <button class="dashboard-menu-btn active" data-target="profile-panel">👤 Profile Settings</button>
          <button class="dashboard-menu-btn" data-target="orders-panel">📦 Order History</button>
          <button class="dashboard-menu-btn" data-target="wishlist-panel">❤️ My Wishlist</button>
          <button class="dashboard-menu-btn" data-target="addresses-panel">🏠 Address Book</button>
        </nav>
      </aside>

      <!-- Main Panels -->
      <main>
        <!-- Panel 1: Profile -->
        <section class="dashboard-content-panel active" id="profile-panel">
          <div class="dashboard-card">
            <h2 class="heading-2 mb-lg">Profile Details</h2>
            <form id="profile-form" style="display: flex; flex-direction: column; gap: 1.25rem;">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="profile-name" required>
              </div>
              <div class="form-group">
                <label class="form-label">Email Address (Read Only)</label>
                <input type="email" class="form-input" id="profile-email" disabled style="opacity: 0.6;">
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-input" id="profile-phone" placeholder="No phone number provided">
              </div>
              <button type="submit" class="btn btn-primary" id="save-profile-btn">Save Changes</button>
            </form>
          </div>

          <div class="dashboard-card">
            <h2 class="heading-2 mb-lg">Change Password</h2>
            <form id="change-password-form" style="display: flex; flex-direction: column; gap: 1.25rem;">
              <div class="form-group">
                <label class="form-label">Current Password</label>
                <input type="password" class="form-input" id="pass-current" required>
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" id="pass-new" required placeholder="Min 6 characters">
              </div>
              <button type="submit" class="btn btn-secondary" id="change-pass-btn">Update Password</button>
            </form>
          </div>
        </section>

        <!-- Panel 2: Orders -->
        <section class="dashboard-content-panel" id="orders-panel">
          <div class="dashboard-card" style="padding: 1.5rem 0;">
            <div style="padding: 0 2rem 1rem;">
              <h2 class="heading-2">Order History</h2>
            </div>
            <div style="overflow-x: auto; width: 100%;">
              <table class="db-table" id="orders-table">
                <thead>
                  <tr>
                    <th>Order #</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Total</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="orders-list">
                  <!-- Orders injected by JS -->
                  <tr><td colspan="5" class="text-center text-muted">Loading orders...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </section>

        <!-- Panel 3: Wishlist -->
        <section class="dashboard-content-panel" id="wishlist-panel">
          <div class="dashboard-card">
            <h2 class="heading-2 mb-lg">My Wishlist</h2>
            <div class="product-grid" id="wishlist-items-grid">
              <!-- Wishlist products injected by JS -->
              <p class="text-muted text-center" style="grid-column: 1/-1;">Loading wishlist...</p>
            </div>
          </div>
        </section>

        <!-- Panel 4: Addresses -->
        <section class="dashboard-content-panel" id="addresses-panel">
          <div class="dashboard-card">
            <div class="flex-between mb-lg">
              <h2 class="heading-2">Address Book</h2>
              <button class="btn btn-primary btn-sm" id="db-add-address-btn">Add Address</button>
            </div>

            <div class="address-card-grid" id="address-grid">
              <!-- Addresses injected by JS -->
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
</div>

<!-- Add Address Modal -->
<div class="modal-overlay" id="address-modal-overlay">
  <div class="modal">
    <div class="modal__header">
      <h3 class="heading-2">Add New Address</h3>
      <button class="modal__close" id="close-address-modal">✕</button>
    </div>
    <form id="modal-address-form" style="display: flex; flex-direction: column; gap: 1rem;">
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input type="text" class="form-input" id="modal-ship-name" required>
        </div>
        <div class="form-group">
          <label class="form-label">Phone Number *</label>
          <input type="text" class="form-input" id="modal-ship-phone" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Street Address *</label>
        <input type="text" class="form-input" id="modal-ship-street" required>
      </div>
      <div class="grid-3">
        <div class="form-group">
          <label class="form-label">City *</label>
          <input type="text" class="form-input" id="modal-ship-city" required>
        </div>
        <div class="form-group">
          <label class="form-label">State *</label>
          <input type="text" class="form-input" id="modal-ship-state" required>
        </div>
        <div class="form-group">
          <label class="form-label">Postal Code *</label>
          <input type="text" class="form-input" id="modal-ship-zip" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Country</label>
        <input type="text" class="form-input" id="modal-ship-country" value="US">
      </div>
      <div style="display: flex; gap: 0.5rem; align-items: center;">
        <input type="checkbox" id="modal-ship-default">
        <label for="modal-ship-default" class="form-label" style="margin: 0; cursor: pointer;">Set as default address</label>
      </div>
      <button type="submit" class="btn btn-primary mt-sm" id="modal-save-btn">Save Address</button>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script type="module">
  import { renderNavbar } from '/assets/js/navbar.js';
  import { authAPI, orderAPI, wishlistAPI, cartAPI, getUser, setUser, isLoggedIn } from '/assets/js/api.js';
  import { toast, formatDate, formatPrice, productCardHTML, orderStatusBadge, updateCartBadge } from '/assets/js/utils.js';

  renderNavbar();

  if (!isLoggedIn()) {
    window.location.href = '/pages/login.html?redirect=/pages/dashboard.html';
  }

  let user = getUser();
  let orders = [];
  let wishlist = [];

  // Initialize view
  function initDashboard() {
    // Populate Sidebar Details
    document.getElementById('dashboard-user-name').textContent = user.name;
    document.getElementById('dashboard-user-avatar').textContent = user.name[0].toUpperCase();
    document.getElementById('dashboard-user-role').textContent = user.role.toUpperCase();

    // Populate Settings Panel Inputs
    document.getElementById('profile-name').value = user.name;
    document.getElementById('profile-email').value = user.email;
    document.getElementById('profile-phone').value = user.phone || '';

    // Handle hash links
    const hash = window.location.hash.substring(1);
    if (hash === 'orders') switchTab('orders-panel');
    else if (hash === 'wishlist') switchTab('wishlist-panel');

    // Load dynamic data
    loadOrders();
    loadWishlist();
    loadAddresses();
  }

  // Handle Tab Switch
  const menuButtons = document.querySelectorAll('.dashboard-menu-btn');
  menuButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      switchTab(btn.dataset.target);
    });
  });

  function switchTab(targetId) {
    document.querySelectorAll('.dashboard-menu-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.dashboard-content-panel').forEach(p => p.classList.remove('active'));

    const activeBtn = document.querySelector(`[data-target="${targetId}"]`);
    if (activeBtn) activeBtn.classList.add('active');
    
    const panel = document.getElementById(targetId);
    if (panel) panel.classList.add('active');
  }

  // Load Order History
  async function loadOrders() {
    try {
      const res = await orderAPI.getMyOrders();
      orders = res.orders || [];
      const list = document.getElementById('orders-list');
      
      if (orders.length === 0) {
        list.innerHTML = `<tr><td colspan="5" class="text-center text-muted">No orders found.</td></tr>`;
        return;
      }

      list.innerHTML = orders.map(order => `
        <tr>
          <td><strong style="color: var(--color-primary);">${order.orderNumber}</strong></td>
          <td>${formatDate(order.createdAt)}</td>
          <td>${orderStatusBadge(order.status)}</td>
          <td>${formatPrice(order.totalPrice)}</td>
          <td>
            <a href="/pages/order-success.html?orderId=${order._id}" class="btn btn-secondary btn-sm">Details</a>
          </td>
        </tr>`).join('');
    } catch (e) {
      document.getElementById('orders-list').innerHTML = `<tr><td colspan="5" class="text-red text-center">Failed to load orders</td></tr>`;
    }
  }

  // Load Wishlist
  async function loadWishlist() {
    const grid = document.getElementById('wishlist-items-grid');
    try {
      const res = await wishlistAPI.get();
      wishlist = res.wishlist?.products || [];
      
      if (wishlist.length === 0) {
        grid.innerHTML = `<p class="text-muted text-center" style="grid-column: 1/-1;">Your wishlist is empty.</p>`;
        return;
      }

      const wishlistIds = wishlist.map(p => p._id);
      grid.innerHTML = wishlist.map(p => productCardHTML(p, wishlistIds)).join('');
      attachWishlistEvents(grid);
    } catch (e) {
      grid.innerHTML = `<p class="text-red text-center" style="grid-column: 1/-1;">Failed to load wishlist</p>`;
    }
  }

  function attachWishlistEvents(container) {
    container.querySelectorAll('.add-to-cart-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const { cart } = await cartAPI.add(btn.dataset.id, 1);
          updateCartBadge(cart.items.length);
          toast.success('Added to cart!');
        } catch(e) { toast.error(e.message); }
      });
    });

    container.querySelectorAll('.wishlist-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          const { added } = await wishlistAPI.toggle(btn.dataset.id);
          toast.success('Wishlist updated!');
          loadWishlist();
        } catch(e) { toast.error(e.message); }
      });
    });
  }

  // Address book management
  function loadAddresses() {
    const grid = document.getElementById('address-grid');
    const addrs = user.addresses || [];

    if (addrs.length === 0) {
      grid.innerHTML = `<p class="text-muted" style="grid-column:1/-1;">No saved addresses in your book.</p>`;
      return;
    }

    grid.innerHTML = addrs.map(addr => `
      <div class="address-card ${addr.isDefault ? 'selected' : ''}">
        <div style="font-weight: 700; display: flex; align-items: center; justify-content: space-between;">
          <span>${addr.fullName} ${addr.isDefault ? '<span class="badge badge-primary">Default</span>' : ''}</span>
          <button class="text-red delete-addr-btn" data-id="${addr._id}" style="font-size: 0.8125rem;">✕ Delete</button>
        </div>
        <div class="text-secondary text-sm mt-xs">${addr.street}, ${addr.city}, ${addr.state} ${addr.postalCode}</div>
        <div class="text-muted text-sm mt-xs">Phone: ${addr.phone}</div>
      </div>`).join('');

    grid.querySelectorAll('.delete-addr-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Are you sure you want to delete this address?')) return;
        try {
          const res = await authAPI.deleteAddress(btn.dataset.id);
          user.addresses = res.addresses;
          setUser(user);
          loadAddresses();
          toast.success('Address removed');
        } catch(e) { toast.error(e.message); }
      });
    });
  }

  // Profile Form submit
  document.getElementById('profile-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('profile-name').value.trim();
    const phone = document.getElementById('profile-phone').value.trim();
    
    const btn = document.getElementById('save-profile-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      const res = await authAPI.updateProfile({ name, phone });
      if (res.success) {
        user = res.user;
        setUser(user);
        initDashboard();
        toast.success('Profile details updated successfully!');
      }
    } catch(err) {
      toast.error(err.message || 'Failed to update profile');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  });

  // Change Password Form submit
  document.getElementById('change-password-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const currentPassword = document.getElementById('pass-current').value;
    const newPassword = document.getElementById('pass-new').value;

    if (newPassword.length < 6) {
      toast.error('New password must be at least 6 characters long');
      return;
    }

    const btn = document.getElementById('change-pass-btn');
    btn.disabled = true;
    btn.textContent = 'Updating…';

    try {
      const res = await authAPI.changePassword({ currentPassword, newPassword });
      if (res.success) {
        document.getElementById('change-password-form').reset();
        toast.success('Password updated successfully!');
      }
    } catch(err) {
      toast.error(err.message || 'Current password incorrect');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  });

  // Add Address Modal Flow
  const modal = document.getElementById('address-modal-overlay');
  document.getElementById('db-add-address-btn').addEventListener('click', () => {
    modal.classList.add('open');
  });

  document.getElementById('close-address-modal').addEventListener('click', () => {
    modal.classList.remove('open');
  });

  document.getElementById('modal-address-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fullName = document.getElementById('modal-ship-name').value.trim();
    const phone = document.getElementById('modal-ship-phone').value.trim();
    const street = document.getElementById('modal-ship-street').value.trim();
    const city = document.getElementById('modal-ship-city').value.trim();
    const state = document.getElementById('modal-ship-state').value.trim();
    const postalCode = document.getElementById('modal-ship-zip').value.trim();
    const country = document.getElementById('modal-ship-country').value.trim() || 'US';
    const isDefault = document.getElementById('modal-ship-default').checked;

    try {
      const res = await authAPI.addAddress({ fullName, phone, street, city, state, postalCode, country, isDefault });
      user.addresses = res.addresses;
      setUser(user);
      loadAddresses();
      document.getElementById('modal-address-form').reset();
      modal.classList.remove('open');
      toast.success('New address added to book!');
    } catch(err) {
      toast.error(err.message || 'Failed to add address');
    }
  });

  initDashboard();
</script>
</body>
</html>
